<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Test Cover EN — The Peoples of Iran</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      font-family: 'Space Grotesk', sans-serif;
      direction: ltr;
      overflow: hidden;
      position: relative;
      background-image: url('bg-d.png');
      background-size: cover;
      background-position: center;
    }

    .card {
      position: absolute;
      inset: 80px;
      background: rgba(14, 11, 8, 0.82);
      border: 1.5px solid rgba(201, 168, 76, 0.55);
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 80px;
      gap: 0;
    }

    .ornament {
      font-size: 28px;
      color: rgba(201, 168, 76, 0.5);
      margin-bottom: 40px;
    }

    .article-title {
      font-size: 80px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }

    .article-subtitle {
      font-size: 38px;
      font-weight: 400;
      color: rgba(237, 229, 213, 0.7);
      line-height: 1.5;
      margin-bottom: 56px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 55%;
      margin-bottom: 48px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(201, 168, 76, 0.4);
    }

    .divider-dot { font-size: 13px; color: #c9a84c; }

    .tagline {
      font-size: 30px;
      font-weight: 400;
      color: rgba(237, 229, 213, 0.65);
      line-height: 1.6;
    }

    .footer {
      position: absolute;
      bottom: 44px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .footer-author {
      font-size: 26px;
      font-weight: 500;
      color: rgba(201, 168, 76, 0.75);
      margin-bottom: 6px;
    }

    .footer-site {
      font-size: 30px;
      font-weight: 700;
      color: rgba(201, 168, 76, 0.7);
      letter-spacing: 0.06em;
    }

    .footer-tagline {
      font-size: 22px;
      font-weight: 300;
      color: #5a5040;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ornament">✦</div>
    <h1 class="article-title">The Peoples of Iran</h1>
    <p class="article-subtitle">Multiple Societies under One Name</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot">◆</div>
      <div class="divider-line"></div>
    </div>

    <p class="tagline">One name, several separate social worlds</p>
  </div>

  <div class="footer">
    <div class="footer-author">Bahman Reshadipour</div>
    <div class="footer-site">25Mordad.com</div>
    <div class="footer-tagline">✦ Beyond The Frame ✦</div>
  </div>

  <script>
    (function () {
      const title = document.querySelector('.article-title');
      let size = 80;
      title.style.fontSize = size + 'px';
      while (title.scrollWidth > title.offsetWidth + 4 && size > 36) {
        size -= 1;
        title.style.fontSize = size + 'px';
      }
    })();
  </script>
</body>
</html>
